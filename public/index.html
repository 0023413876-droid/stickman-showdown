<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Stickman Showdown - Multi-mode</title>
    <script src="/socket.io/socket.io.js"></script>
    <style>
        body {
            margin: 0;
            background-color: #222;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            color: white;
            font-family: sans-serif;
            flex-direction: column;
            position: relative;
            overflow: hidden;
            touch-action: none;
        }
        h1 {
            font-size: 24px;
            margin-top: 10px;
            margin-bottom: 10px;
            text-align: center;
        }
        
        .game-wrapper {
            position: relative;
            width: 100%;
            max-width: 800px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }
        canvas {
            background-color: #111;
            border: 4px solid #fff;
            box-shadow: 0 0 20px rgba(255,255,255,0.2);
            transition: transform 0.05s;
            max-width: 100%;
            height: auto;
            box-sizing: border-box;
        }
        
        /* GIAO DIỆN MENU PHÒNG CHỜ */
        #menu {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            background: rgba(17, 17, 17, 0.95);
            border: 4px solid white;
            padding: 20px;
            text-align: center;
            box-shadow: 0 0 30px rgba(255,255,255,0.3);
            z-index: 10;
            width: 90%;
            max-width: 400px;
            box-sizing: border-box;
        }
        #mainMenu, #difficultyMenu, #onlineMenu, #matchmakingMenu {
            display: flex;
            flex-direction: column;
        }
        #difficultyMenu, #onlineMenu, #matchmakingMenu {
            display: none;
        }
        button {
            background-color: #fff;
            color: #111;
            border: none;
            padding: 12px 20px;
            font-size: 16px;
            font-weight: bold;
            margin: 8px;
            cursor: pointer;
            transition: 0.2s;
            border-radius: 5px;
            width: 90%;
            align-self: center;
        }
        button:hover {
            transform: scale(1.05);
        }
        .btn-easy { background-color: #2ecc71; color: white; }
        .btn-medium { background-color: #f1c40f; color: #111; }
        .btn-hard { background-color: #e74c3c; color: white; }
        .btn-back { background-color: #7f8c8d; color: white; font-size: 14px; }
        .btn-online { background-color: #9b59b6; color: white; }
        .btn-cancel { background-color: #e74c3c; color: white; font-size: 14px; }
        
        .btn-restart { background-color: #2ecc71; color: white; }
        .btn-menu { background-color: #e67e22; color: white; }
        
        /* Nút chế độ online màu sắc phân biệt */
        .btn-p2 { background-color: #3498db; color: white; }
        .btn-p3 { background-color: #2ecc71; color: white; }
        .btn-p4 { background-color: #f1c40f; color: #111; }
        .btn-p5 { background-color: #e74c3c; color: white; }
        
        /* OVERLAY GAME OVER */
        #gameOverOverlay {
            display: none;
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.7);
            justify-content: center;
            align-items: center;
            flex-direction: column;
            z-index: 5;
        }
        #winnerText {
            font-size: 24px;
            font-weight: bold;
            margin-bottom: 25px;
            text-align: center;
            text-shadow: 0 0 10px rgba(255,255,255,0.5);
            padding: 0 10px;
        }
        
        /* NÚT VÀ POPUP TẠM DỪNG (3 VẠCH) */
        #inGameMenuBtn {
            display: none;
            position: absolute;
            top: 15px;
            right: 20px;
            font-size: 28px;
            color: white;
            background: rgba(0, 0, 0, 0.6);
            border: 2px solid white;
            border-radius: 8px;
            padding: 2px 12px;
            cursor: pointer;
            z-index: 100;
            user-select: none;
            -webkit-user-select: none;
        }
        #inGameMenuPopup {
            display: none;
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            background: rgba(17, 17, 17, 0.95);
            border: 4px solid #e74c3c;
            padding: 20px;
            text-align: center;
            z-index: 101;
            flex-direction: column;
            box-shadow: 0 0 30px rgba(231, 76, 60, 0.5);
            width: 250px;
        }
        #inGameMenuPopup button {
            margin: 10px 0;
            padding: 10px;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
            border: none;
            width: 100%;
        }
        
        /* KHU VỰC ĐIỀU KHIỂN */
        .controls {
            margin-top: 10px;
            display: flex;
            gap: 20px;
            font-size: 12px;
            text-align: center;
        }
        #mobileControls {
            display: none;
            width: 100%;
            max-width: 800px;
            justify-content: space-between;
            padding: 15px 20px;
            box-sizing: border-box;
            position: relative;
            z-index: 5;
        }
        .control-group {
            display: flex;
            gap: 15px;
        }
        .mob-btn {
            background-color: rgba(255, 255, 255, 0.2);
            border: 2px solid rgba(255, 255, 255, 0.5);
            border-radius: 50%;
            width: 60px;
            height: 60px;
            display: flex;
            justify-content: center;
            align-items: center;
            font-size: 24px;
            color: white;
            user-select: none;
            -webkit-user-select: none;
        }
        .mob-btn:active {
            background-color: rgba(255, 255, 255, 0.6);
            transform: scale(0.95);
        }
        
        @media (max-width: 768px) {
            .controls { display: none; }
            #mobileControls { display: flex; }
        }
    </style>
</head>
<body>

    <h1>STICKMAN SHOWDOWN</h1>
    
    <div class="game-wrapper">
        <div id="menu">
            <div id="mainMenu">
                <h2>CHỌN CHẾ ĐỘ CHƠI</h2>
                <button onclick="showDifficultyMenu()">ĐẤU VỚI MÁY (BOT)</button>
                <button onclick="startGame('pvp')">2 NGƯỜI CHƠI (CHUNG MÁY)</button>

            </div>
            
            <div id="difficultyMenu">
                <h2>CHỌN ĐỘ KHÓ CỦA BOT</h2>
                <button class="btn-easy" onclick="startGame('ai', 'easy')">DỄ</button>
                <button class="btn-medium" onclick="startGame('ai', 'medium')">TRUNG BÌNH</button>
                <button class="btn-hard" onclick="startGame('ai', 'hard')">KHÓ</button>
                <button class="btn-back" onclick="resetToMenu()">⬅ QUAY LẠI</button>
            </div>
            
            <div id="onlineMenu">
                <h2>CHỌN SỐ NGƯỜI CHƠI</h2>
                <button class="btn-p2" onclick="startOnlineMatchmaking(2)">2 NGƯỜI</button>
                <button class="btn-p3" onclick="startOnlineMatchmaking(3)">3 NGƯỜI</button>
                <button class="btn-p4" onclick="startOnlineMatchmaking(4)">4 NGƯỜI</button>
                <button class="btn-p5" onclick="startOnlineMatchmaking(5)">5 NGƯỜI</button>
                <button class="btn-back" onclick="resetToMenu()">⬅ QUAY LẠI</button>
            </div>
            
            <div id="matchmakingMenu">
                <h2>ĐANG TÌM PHÒNG...</h2>
                <p id="playerCountText">Chờ người chơi kết nối...</p>
                <button class="btn-cancel" onclick="cancelOnlineMatchmaking()">❌ HỦY TÌM TRẬN</button>
            </div>
        </div>

        <div style="position: relative; width: 100%;">
            <canvas id="gameCanvas" width="800" height="400"></canvas>
            
            <div id="inGameMenuBtn" onclick="toggleInGameMenu()">☰</div>
            
            <div id="inGameMenuPopup">
                <h3 style="margin-top: 0;">TẠM DỪNG</h3>
                <button class="btn-restart" id="inGameRestartBtn" onclick="restartFromInGameMenu()">🔄 CHƠI LẠI</button>
                <button class="btn-cancel" onclick="quitMatch()">❌ THOÁT TRẬN</button>
                <button class="btn-back" onclick="toggleInGameMenu()">⬅ TIẾP TỤC</button>

            <div id="gameOverOverlay">

                    <button id="restartBtn" class="btn-restart" onclick="restartGame()">CHƠI LẠI</button>

        <div id="mobileControls">
            <div class="control-group">
                <div class="mob-btn" id="btnLeft">⬅️</div>
                <div class="mob-btn" id="btnRight">➡️</div>
            </div>
            <div class="control-group">
                <div class="mob-btn" id="btnJump">⬆️</div>
                <div class="mob-btn" id="btnAttack">👊</div>
            </div>
        </div>
    </div>

    <div class="controls">
        <div>
            <h3 style="color: #3498db;">Player 1 (Xanh Dương)</h3>
            <p>A, D: Di chuyển | W: Nhảy | Click Chuột: Đấm</p>
        </div>
        <div id="p2ControlText">
            <h3 style="color: #e74c3c;">Player 2 (Đỏ)</h3>
            <p>⬅ ➡: Di chuyển | ⬆: Nhảy | L: Đấm</p>
        </div>
    </div>

<script>
const canvas = document.getElementById("gameCanvas");
const ctx = canvas.getContext("2d");

// Kết nối Socket.io an toàn (phòng trường hợp chạy offline không có server)
const socket = (typeof io !== "undefined") ? io() : { emit: () => {}, on: () => {} };

// Cấu hình vật lý toàn cục và camera
const GRAVITY = 0.6;
const GROUND_Y = 350;
const MAP_WIDTH = 1600; 
const VIEW_WIDTH = canvas.width;

// Biến điều khiển trạng thái game
let gameMode = null; 
let botDifficulty = 'medium';
let isGameOver = false;
let winner = null;

// Biến điều khiển chế độ Online Multiplayer
let onlineRoomId = null;
let myId = null;
let onlinePlayers = {};
const ONLINE_COLORS = ["#3498db", "#e74c3c", "#2ecc71", "#f1c40f", "#9b59b6"];

// Các hệ thống hiệu ứng đặc biệt
let fireworks = [];
let hitEffects = [];
let shakeTimer = 0;
let cameraX = 0;

// Hệ thống quản lý phím bấm
const keys = {
    a: false, d: false, w: false, click: false,
    ArrowLeft: false, ArrowRight: false, ArrowUp: false, l: false
};

window.addEventListener("keydown", (e) => { if (keys.hasOwnProperty(e.key)) keys[e.key] = true; });
window.addEventListener("keyup", (e) => { if (keys.hasOwnProperty(e.key)) keys[e.key] = false; });
canvas.addEventListener("mousedown", (e) => { if (e.button === 0) keys['click'] = true; });
canvas.addEventListener("mouseup", (e) => { if (e.button === 0) keys['click'] = false; });

// Thiết lập điều khiển cảm ứng đa điểm trên mobile
function setupTouchButton(buttonId, keyName) {
    const btn = document.getElementById(buttonId);
    if(!btn) return;
    btn.addEventListener("touchstart", (e) => { e.preventDefault(); keys[keyName] = true; }, { passive: false });
    btn.addEventListener("touchend", (e) => { e.preventDefault(); keys[keyName] = false; }, { passive: false });
}
setupTouchButton('btnLeft', 'a');
setupTouchButton('btnRight', 'd');
setupTouchButton('btnJump', 'w');
setupTouchButton('btnAttack', 'click');

// LỚP HIỆU ỨNG NỔ CHỮ VÀ TIA LỬA KHI TRÚNG ĐÒN
class HitExplosion {
    constructor(x, y) {
        this.x = x;
        this.y = y;
        this.life = 1.0;
        this.decay = 0.04;
        this.maxShockwaveRadius = 45;
        this.sparks = [];
        
        for (let i = 0; i < 12; i++) {
            let angle = Math.random() * Math.PI * 2;
            let speed = Math.random() * 6 + 3;
            this.sparks.push({
                x: 0, y: 0,
                vx: Math.cos(angle) * speed,
                vy: Math.sin(angle) * speed,
                radius: Math.random() * 3 + 2,
                color: "#ff9f43"
            });
        }
        this.textYOffset = 0;
        this.textVx = (Math.random() - 0.5) * 2;
        this.textVy = -5;
    }
    update() {
        this.life -= this.decay;
        this.sparks.forEach(s => {
            s.x += s.vx;
            s.y += s.vy;
            s.vy += 0.1;
        });
        this.textYOffset += this.textVy;
        this.textVy += 0.2;
    }
    draw() {
        if (this.life <= 0) return;
        ctx.save();
        let drawX = this.x - cameraX;
        
        ctx.beginPath();
        ctx.arc(drawX, this.y, (1 - this.life) * this.maxShockwaveRadius, 0, Math.PI * 2);
        ctx.strokeStyle = `rgba(255, 67, 67, ${this.life})`;
        ctx.lineWidth = 2;
        ctx.stroke();

        this.sparks.forEach(s => {
            ctx.beginPath();
            ctx.arc(drawX + s.x, this.y + s.y, s.radius, 0, Math.PI * 2);
            ctx.fillStyle = s.color;
            ctx.globalAlpha = this.life;
            ctx.fill();
        });

        ctx.globalAlpha = Math.min(1, this.life * 1.5);
        ctx.font = "italic bold 16px Arial";
        ctx.fillStyle = "#ff3838";
        ctx.strokeStyle = "#ffffff";
        ctx.lineWidth = 3;
        let txt = "HIT! -5 HP";
        let textX = drawX + (this.textVx * (1 - this.life) * 10);
        let textY = this.y - 25 + this.textYOffset;
        ctx.strokeText(txt, textX - 30, textY);
        ctx.fillText(txt, textX - 30, textY);
        ctx.restore();
    }
}

// LỚP NHÂN VẬT STICKMAN CHÍNH
class Stickman {
    constructor(x, y, color, controls, isAI = false, id = null) {
        this.id = id;
        this.x = x;
        this.y = y;
        this.color = color;
        this.controls = controls;
        this.isAI = isAI;
        this.width = 30;
        this.height = 80;
        this.vx = 0;
        this.vy = 0;
        this.speed = 5;
        this.jumpForce = 12;
        this.isGrounded = false;
        this.hp = 100;
        this.isAttacking = false;
        this.attackCooldown = 0;
        this.facing = (x < MAP_WIDTH / 2) ? 1 : -1;
        this.animTimer = 0;
        this.hasHitRegistered = false; // Ngăn chặn một phát đấm trúng liên tiếp nhiều lần
    }
    reset(x, y, facing) {
        this.x = x;
        this.y = y;
        this.vx = 0;
        this.vy = 0;
        this.hp = 100;
        this.isAttacking = false;
        this.attackCooldown = 0;
        this.facing = facing;
        this.animTimer = 0;
        this.hasHitRegistered = false;
    }
    update(opponent) {
        if (this.vx !== 0) this.animTimer += 0.2; else this.animTimer = 0;
        
        this.vy += GRAVITY;
        this.y += this.vy;

        if (this.y + this.height >= GROUND_Y) {
            this.y = GROUND_Y - this.height;
            this.vy = 0;
            this.isGrounded = true;
        } else {
            this.isGrounded = false;
        }

        if (this.attackCooldown > 0) this.attackCooldown--;

        if (gameMode === 'online') {
            this.x += this.vx;
        } else if (this.isAI) {
            this.handleAI(opponent);
            this.x += this.vx;
        } else {
            this.handlePlayer();
            this.x += this.vx;
        }

        if (this.x < 0) this.x = 0;
        if (this.x + this.width > MAP_WIDTH) this.x = MAP_WIDTH - this.width;
    }
    handlePlayer() {
        this.vx = 0;
        if (keys[this.controls.left]) { this.vx = -this.speed; this.facing = -1; }
        if (keys[this.controls.right]) { this.vx = this.speed; this.facing = 1; }
        if (keys[this.controls.up] && this.isGrounded) { this.vy = -this.jumpForce; this.isGrounded = false; }
        if (keys[this.controls.attack] && this.attackCooldown === 0) { this.triggerAttack(); }
    }
    handleAI(player) {
        this.vx = 0;
        let distanceX = player.x - this.x;
        let absoluteDistanceX = Math.abs(distanceX);

        if (distanceX > 0) this.facing = 1; else if (distanceX < 0) this.facing = -1;

        let speedModifier = botDifficulty === 'easy' ? 0.5 : botDifficulty === 'hard' ? 1.1 : 0.8;
        let punchChance = botDifficulty === 'easy' ? 0.06 : botDifficulty === 'hard' ? 0.35 : 0.15;

        if (absoluteDistanceX > 40) {
            this.vx = distanceX > 0 ? this.speed * speedModifier : -this.speed * speedModifier;
        }
        if (absoluteDistanceX <= 50 && this.attackCooldown === 0 && Math.random() < punchChance) {
            this.triggerAttack();
        }
    }
    triggerAttack() {
        this.isAttacking = true;
        this.hasHitRegistered = false; // Đấm lượt mới -> cho phép ghi nhận va chạm mới
        this.attackCooldown = 25;
        setTimeout(() => this.isAttacking = false, 150);
    }
    draw() {
        if (this.hp <= 0) return;
        let drawX = this.x - cameraX;
        
        ctx.strokeStyle = this.color;
        ctx.lineWidth = 4;
        ctx.lineCap = "round";
        ctx.lineJoin = "round";

        let lean = this.isAttacking ? 8 * this.facing : 0;
        let headX = drawX + this.width / 2 + lean;
        let headY = this.y + 15;
        let spineBottomX = drawX + this.width / 2;
        let spineBottomY = this.y + 50;

        ctx.beginPath();
        ctx.arc(headX, headY, 12, 0, Math.PI * 2);
        ctx.stroke();

        ctx.beginPath();
        ctx.moveTo(headX, headY + 12);
        ctx.lineTo(spineBottomX, spineBottomY);
        ctx.stroke();

        let leftLegX = spineBottomX - 12, leftLegY = this.y + this.height,
            rightLegX = spineBottomX + 12, rightLegY = this.y + this.height;

        if (this.vx !== 0 && this.isGrounded) {
            let swing = Math.sin(this.animTimer) * 18;
            leftLegX = spineBottomX + swing;
            rightLegX = spineBottomX - swing;
        }

        ctx.beginPath();
        ctx.moveTo(spineBottomX, spineBottomY); ctx.lineTo(leftLegX, leftLegY);
        ctx.moveTo(spineBottomX, spineBottomY); ctx.lineTo(rightLegX, rightLegY);
        ctx.stroke();

        let shoulderX = headX;
        let shoulderY = headY + 18;

        ctx.beginPath();
        if (this.isAttacking) {
            let fistX = shoulderX + (45 * this.facing);
            ctx.moveTo(shoulderX, shoulderY);
            ctx.lineTo(fistX, shoulderY);
            ctx.stroke();
            ctx.beginPath();
            ctx.arc(fistX, shoulderY, 6, 0, Math.PI * 2);
            ctx.fillStyle = this.color;
            ctx.fill();
        } else {
            ctx.moveTo(shoulderX, shoulderY);
            ctx.lineTo(shoulderX - 10, shoulderY + 20);
            ctx.lineTo(shoulderX - 5, shoulderY + 38);
            ctx.stroke();
        }
    }
    getAttackBox() {
        return {
            x: this.facing === 1 ? this.x + this.width : this.x - 45,
            y: this.y + 10,
            width: 45,
            height: 20
        };
    }
}

// Khởi tạo hai nhân vật mặc định chơi Offline
const p1 = new Stickman(200, 200, "#3498db", { left: 'a', right: 'd', up: 'w', attack: 'click' });
const p2 = new Stickman(1400, 200, "#e74c3c", { left: 'ArrowLeft', right: 'ArrowRight', up: 'ArrowUp', attack: 'l' });

// LỚP HẠT PHÁO HOA KHI CHIẾN THẮNG
class Particle {
    constructor(x, y, color) {
        this.x = x; this.y = y; this.color = color;
        this.radius = Math.random() * 3 + 1;
        let angle = Math.random() * Math.PI * 2;
        let speed = Math.random() * 5 + 2;
        this.vx = Math.cos(angle) * speed;
        this.vy = Math.sin(angle) * speed;
        this.alpha = 1;
        this.decay = 0.015;
    }
    update() {
        this.x += this.vx; this.y += this.vy;
        this.vy += 0.05; this.alpha -= this.decay;
    }
    draw() {
        ctx.save();
        ctx.globalAlpha = this.alpha;
        ctx.beginPath();
        ctx.arc(this.x - cameraX, this.y, this.radius, 0, Math.PI * 2);
        ctx.fillStyle = this.color;
        ctx.fill();
        ctx.restore();
    }
}

function spawnFirework() {
    let colors = ['#f1c40f', '#e74c3c', '#2ecc71', '#3498db', '#9b59b6'];
    let randomColor = colors[Math.floor(Math.random() * colors.length)];
    let targetX = Math.random() * VIEW_WIDTH + cameraX;
    let targetY = Math.random() * 200 + 50;
    for(let i = 0; i < 40; i++) fireworks.push(new Particle(targetX, targetY, randomColor));
}

// HÀM KIỂM TRA ĐẤM TRÚNG NHAU (BOX COLLISION)
function checkHit(attacker, defender) {
    if (!attacker.isAttacking || defender.hp <= 0) return false;
    let box = attacker.getAttackBox();
    return (box.x < defender.x + defender.width &&
            box.x + box.width > defender.x &&
            box.y < defender.y + defender.height &&
            box.y + box.height > defender.y);
}

// VẼ THANH MÁU GIAO DIỆN LÊN GÓC MÀN HÌNH
function drawUI() {
    if (gameMode !== 'online') {
        ctx.fillStyle = "#555"; ctx.fillRect(20, 20, 200, 20);
        ctx.fillStyle = "#3498db"; ctx.fillRect(20, 20, Math.max(0, p1.hp * 2), 20);
        
        ctx.fillStyle = "#555"; ctx.fillRect(canvas.width - 220, 20, 200, 20);
        ctx.fillStyle = "#e74c3c"; ctx.fillRect(canvas.width - 220, 20, Math.max(0, p2.hp * 2), 20);
    } else {
        let offsetY = 20;
        ctx.font = "12px Arial";
        for (let id in onlinePlayers) {
            let p = onlinePlayers[id];
            let isMe = (id === myId);
            ctx.fillStyle = "rgba(0,0,0,0.4)";
            ctx.fillRect(20, offsetY, 180, 18);
            ctx.fillStyle = p.hp > 0 ? p.color : "#555";
            ctx.fillRect(20, offsetY, Math.max(0, p.hp * 1.8), 18);
            ctx.fillStyle = "#fff";
            ctx.fillText((isMe ? "BẠN " : "PLAYER ") + `(${Math.round(p.hp)} HP)`, 25, offsetY + 13);
            offsetY += 23;
        }
    }
}

// VÒNG LẶP GAME CHÍNH (GAME LOOP)
function gameLoop() {
    if (isGameOver) return gameOverLoop();
    if (gameMode === null) return;

    ctx.clearRect(0, 0, canvas.width, canvas.height);

    // Tính toán góc Camera bám sát người chơi
    let targetX = p1.x;
    if (gameMode === 'online' && onlinePlayers[myId]) targetX = onlinePlayers[myId].x;
    
    cameraX = targetX - VIEW_WIDTH / 2;
    if (cameraX < 0) cameraX = 0;
    if (cameraX > MAP_WIDTH - VIEW_WIDTH) cameraX = MAP_WIDTH - VIEW_WIDTH;

    // Xử lý hiệu ứng Rung Màn Hình (Screen Shake)
    if (shakeTimer > 0) {
        let dx = (Math.random() - 0.5) * 7;
        let dy = (Math.random() - 0.5) * 7;
        canvas.style.transform = `translate(${dx}px, ${dy}px)`;
        shakeTimer--;
    } else {
        canvas.style.transform = 'translate(0px, 0px)';
    }

    // Vẽ đường mặt đất liền mạch
    ctx.strokeStyle = "#fff";
    ctx.lineWidth = 2;
    ctx.beginPath();
    ctx.moveTo(0 - cameraX, GROUND_Y);
    ctx.lineTo(MAP_WIDTH - cameraX, GROUND_Y);
    ctx.stroke();

    // CHẾ ĐỘ ONLINE MULTIPLAYER
    if (gameMode === 'online') {
        let myCharacter = onlinePlayers[myId];
        if (myCharacter && myCharacter.hp > 0) {
            myCharacter.vx = 0;
            if (keys['a']) { myCharacter.vx = -myCharacter.speed; myCharacter.facing = -1; }
            if (keys['d']) { myCharacter.vx = myCharacter.speed; myCharacter.facing = 1; }
            if (keys['w'] && myCharacter.isGrounded) { myCharacter.vy = -myCharacter.jumpForce; myCharacter.isGrounded = false; }
            if (keys['click'] && myCharacter.attackCooldown === 0) {
                myCharacter.triggerAttack();
            }

            // KIỂM TRA ĐẤM TRÚNG ĐỐI THỦ ONLINE
            if (myCharacter.isAttacking && !myCharacter.hasHitRegistered) {
                for (let defenderId in onlinePlayers) {
                    if (defenderId === myId) continue;
                    let defender = onlinePlayers[defenderId];
                    if (checkHit(myCharacter, defender)) {
                        myCharacter.hasHitRegistered = true;
                        // Gửi tín hiệu đòn đánh lên Server đề nghị trừ máu đối thủ thời gian thực
                        socket.emit('playerHit', {
                            roomId: onlineRoomId,
                            targetId: defenderId,
                            facing: myCharacter.facing
                        });
                    }
                }
            }
        }

        for (let id in onlinePlayers) onlinePlayers[id].update();
        for (let id in onlinePlayers) onlinePlayers[id].draw();

        // Gửi thông tin hành động và máu hiện tại của mình lên phòng liên tục
        if (myCharacter) {
            socket.emit('playerAction', {
                roomId: onlineRoomId, x: myCharacter.x, y: myCharacter.y, vx: myCharacter.vx, vy: myCharacter.vy,
                isGrounded: myCharacter.isGrounded, facing: myCharacter.facing, isAttacking: myCharacter.isAttacking, hp: myCharacter.hp
            });
        }

        // Kiểm tra điều kiện sống còn của trận đấu Online
        let alivePlayers = Object.values(onlinePlayers).filter(p => p.hp > 0);
        if (myCharacter && myCharacter.hp <= 0 && !isGameOver) {
            isGameOver = true; winner = 'lost';
            document.getElementById("winnerText").innerText = "BẠN ĐÃ BỊ LOẠI!";
            document.getElementById("gameOverOverlay").style.display = "flex";
        } else if (alivePlayers.length === 1 && Object.keys(onlinePlayers).length >= 2 && !isGameOver) {
            isGameOver = true;
            winner = alivePlayers[0].id === myId ? 'won' : 'lost';
            document.getElementById("winnerText").innerText = winner === 'won' ? "🏆 CHIẾN THẮNG KHẢ HOÀN (TOP 1)!" : "TRẬN ĐẤU KẾT THÚC!";
            document.getElementById("gameOverOverlay").style.display = "flex";
        }

    // CHẾ ĐỘ OFFLINE (BOT HOẶC PVP CHUNG MÁY)
    } else {
        p1.update(p2); p2.update(p1);
        
        if (checkHit(p1, p2)) {
            p2.hp -= 5; p2.x += 15 * p1.facing; p1.isAttacking = false; shakeTimer = 10;
            hitEffects.push(new HitExplosion(p2.x + p2.width / 2, p2.y + p2.height / 3));
        }
        if (checkHit(p2, p1)) {
            p1.hp -= 5; p1.x += 15 * p2.facing; p2.isAttacking = false; shakeTimer = 10;
            hitEffects.push(new HitExplosion(p1.x + p1.width / 2, p1.y + p1.height / 3));
        }

        p1.draw(); p2.draw();

        if (p1.hp <= 0 || p2.hp <= 0) {
            isGameOver = true;
            winner = p1.hp <= 0 ? 'p2' : 'p1';
            document.getElementById("winnerText").innerText = winner === 'p2' ? (p2.isAI ? "BOT ĐÃ THẮNG TRẬN!" : "P2 ĐÃ CHIẾN THẮNG!") : "🏆 BẠN ĐÃ CHIẾN THẮNG!";
            document.getElementById("gameOverOverlay").style.display = "flex";
        }
    }

    // Cập nhật và vẽ các vụ nổ sát thương chữ HIT
    for (let i = hitEffects.length - 1; i >= 0; i--) {
        hitEffects[i].update(); hitEffects[i].draw();
        if (hitEffects[i].life <= 0) hitEffects.splice(i, 1);
    }

    drawUI();
    requestAnimationFrame(gameLoop);
}

// VÒNG LẶP KHI KẾT THÚC GAME (BẮN PHÁO HOA NHẠO MẮT)
function gameOverLoop() {
    if (!isGameOver) return;
    ctx.fillStyle = "rgba(17, 17, 17, 0.15)";
    ctx.fillRect(0, 0, canvas.width, canvas.height);

    if (winner === 'won' || winner === 'p1') {
        if (Math.random() < 0.08) spawnFirework();
    }

    for (let i = fireworks.length - 1; i >= 0; i--) {
        fireworks[i].update(); fireworks[i].draw();
        if (fireworks[i].alpha <= 0) fireworks.splice(i, 1);
    }
    requestAnimationFrame(gameOverLoop);
}

// LẮNG NGHE SỰ KIỆN TRỪ MÁU THỜI GIAN THỰC TỪ SERVER
socket.on('onPlayerHit', (data) => {
    // Nếu chính là máy mình bị đánh trúng
    if (data.targetId === myId) {
        let myCharacter = onlinePlayers[myId];
        if (myCharacter && myCharacter.hp > 0) {
            myCharacter.hp -= 5;               // Bản thân tự chịu sát thương trừ máu công bằng
            myCharacter.x += 15 * data.facing; // Đẩy lùi nhân vật ra sau theo hướng bị đấm công bằng
            shakeTimer = 10;                   // Kích hoạt hiệu ứng giật rung màn hình
            hitEffects.push(new HitExplosion(myCharacter.x + myCharacter.width / 2, myCharacter.y + myCharacter.height / 3));
        }
    } else {
        // Nếu đối thủ khác trong phòng bị đấm trúng, vẽ luôn hiệu ứng nổ tại vị trí đó để đồng bộ
        let victim = onlinePlayers[data.targetId];
        if (victim) {
            shakeTimer = 5;
            hitEffects.push(new HitExplosion(victim.x + victim.width / 2, victim.y + victim.height / 3));
        }
    }
});

// LẮNG NGHE ĐỒNG BỘ TOÀN BỘ DI CHUYỂN, HÀNH ĐỘNG TỪ MÁY KHÁC
socket.on('opponentAction', (data) => {
    if (onlinePlayers[data.id] && data.id !== myId) {
        let op = onlinePlayers[data.id];
        op.x = data.x;
        op.y = data.y;
        op.vx = data.vx;
        op.vy = data.vy;
        op.isGrounded = data.isGrounded;
        op.facing = data.facing;
        op.isAttacking = data.isAttacking;
        op.hp = data.hp; // Đồng bộ liên tục chỉ số máu thực để tránh lệch mạng
    }
});

// HỆ THỐNG ĐIỀU HƯỚNG MENU VÀ TRẠNG THÁI GAME
function toggleInGameMenu() {
    const popup = document.getElementById("inGameMenuPopup");
    popup.style.display = (popup.style.display === "flex") ? "none" : "flex";
}
function restartFromInGameMenu() {
    toggleInGameMenu();
    restartGame();
}
function quitMatch() {
    document.getElementById("inGameMenuPopup").style.display = "none";
    document.getElementById("inGameMenuBtn").style.display = "none";
    if (gameMode === 'online') socket.emit('leaveMatch');
    resetToMenu(true);
}
function showDifficultyMenu() {
    document.getElementById("mainMenu").style.display = "none";
    document.getElementById("difficultyMenu").style.display = "flex";
}
function showOnlineMenu() {
    document.getElementById("mainMenu").style.display = "none";
    document.getElementById("onlineMenu").style.display = "flex";
}
function startOnlineMatchmaking(maxPlayers) {
    document.getElementById("onlineMenu").style.display = "none";
    document.getElementById("matchmakingMenu").style.display = "flex";
    document.getElementById("playerCountText").innerText = `Chờ người chơi kết nối (1/${maxPlayers})...`;
    gameMode = 'online';
    socket.emit('findMatch', { maxPlayers: maxPlayers });
}
function cancelOnlineMatchmaking() {
    socket.emit('cancelFindMatch');
    resetToMenu();
}
function resetToMenu(fromGameOver = false) {
    gameMode = null; onlineRoomId = null; onlinePlayers = {}; shakeTimer = 0;
    canvas.style.transform = 'translate(0px, 0px)';
    document.getElementById("gameOverOverlay").style.display = "none";
    document.getElementById("inGameMenuBtn").style.display = "none";
    document.getElementById("inGameMenuPopup").style.display = "none";
    document.getElementById("menu").style.display = "block";
    document.getElementById("mainMenu").style.display = "flex";
    document.getElementById("difficultyMenu").style.display = "none";
    document.getElementById("onlineMenu").style.display = "none";
    document.getElementById("matchmakingMenu").style.display = "none";
    ctx.clearRect(0, 0, canvas.width, canvas.height);
}

// LẮNG NGHE CÁC TÍN HIỆU TỪ SERVER GỬI VỀ TRƯỚC VÀ TRONG TRẬN ĐẤU ONLINE
socket.on('roomUpdate', (data) => {
    document.getElementById("playerCountText").innerText = `Chờ người chơi kết nối (${data.currentPlayers}/${data.maxPlayers})...`;
});

socket.on('matchFound', (data) => {
    onlineRoomId = data.roomId;
    myId = socket.id;
    onlinePlayers = {};
    
    document.getElementById("menu").style.display = "none";
    document.getElementById("restartBtn").style.display = "none"; 
    document.getElementById("inGameMenuBtn").style.display = "block";
    document.getElementById("inGameRestartBtn").style.display = "none"; // Ẩn nút chơi lại vì đang đấu mạng công bằng
    
    data.players.forEach((id, index) => {
        onlinePlayers[id] = new Stickman(150 + (index * 300), 200, ONLINE_COLORS[index] || "#ffffff", null, false, id);
    });
    
    isGameOver = false;
    hitEffects = [];
    gameLoop();
});

socket.on('opponentLeft', (data) => {
    if (onlinePlayers[data.id]) onlinePlayers[data.id].hp = 0; // Đánh dấu đối thủ thoát trận bằng cách cho cạn máu
});

// KHỞI CHẠY CHẾ ĐỘ OFFLINE
function startGame(mode, difficulty = 'medium') {
    gameMode = mode;
    botDifficulty = difficulty;
    isGameOver = false; winner = null;
    fireworks = []; hitEffects = []; shakeTimer = 0;
    canvas.style.transform = 'translate(0px, 0px)';
    
    document.getElementById("menu").style.display = "none";
    document.getElementById("gameOverOverlay").style.display = "none";
    document.getElementById("restartBtn").style.display = "inline-block";
    document.getElementById("inGameMenuBtn").style.display = "block";
    document.getElementById("inGameRestartBtn").style.display = "block";
    
    p1.reset(200, 200, 1);
    if (mode === 'ai') {
        p2.isAI = true; p2.reset(1400, 200, -1);
        let diffText = (difficulty === 'easy') ? "Dễ" : (difficulty === 'hard') ? "Khó" : "Trung bình";
        document.getElementById("p2ControlText").innerHTML = `<h3 style=\"color: #e74c3c;\">Máy (Bot Tự Động)</h3><p>Độ khó: ${diffText}</p>`;
    } else {
        p2.isAI = false; p2.reset(1400, 200, -1);
        document.getElementById("p2ControlText").innerHTML = `<h3 style=\"color: #e74c3c;\">Player 2 (Đỏ)</h3><p>⬅ ➡: Di chuyển | ⬆: Nhảy | L: Đấm</p>`;
    }
    gameLoop();
}

function restartGame() {
    if(gameMode === 'online') return;
    isGameOver = false; winner = null;
    fireworks = []; hitEffects = []; shakeTimer = 0;
    canvas.style.transform = 'translate(0px, 0px)';
    document.getElementById("gameOverOverlay").style.display = "none";
    p1.reset(200, 200, 1);
    p2.reset(1400, 200, -1);
    gameLoop();
}
</script>
