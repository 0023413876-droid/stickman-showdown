<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Stickman Showdown - Online Multiplayer Edition</title>
    <script src="/socket.io/socket.io.js"></script>
    <style>
        body {
            margin: 0;
            background-color: #222;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            color: white;
            font-family: sans-serif;
            flex-direction: column;
            position: relative;
            overflow: hidden;
        }
        canvas {
            background-color: #111;
            border: 4px solid #fff;
            box-shadow: 0 0 20px rgba(255,255,255,0.2);
            transition: transform 0.05s ease-in-out;
        }
        .controls {
            margin-top: 15px;
            display: flex;
            gap: 40px;
            font-size: 14px;
        }
        #menu {
            position: absolute;
            background: rgba(17, 17, 17, 0.95);
            border: 4px solid white;
            padding: 30px;
            text-align: center;
            box-shadow: 0 0 30px rgba(255,255,255,0.3);
            z-index: 10;
            min-width: 300px;
        }
        #difficultyMenu {
            display: none;
            flex-direction: column;
        }
        button {
            background-color: #fff;
            color: #111;
            border: none;
            padding: 12px 24px;
            font-size: 16px;
            font-weight: bold;
            margin: 10px;
            cursor: pointer;
            transition: 0.2s;
        }
        button:hover {
            background-color: #3498db;
            color: white;
            transform: scale(1.05);
        }
        .btn-easy { background-color: #2ecc71; color: white; }
        .btn-easy:hover { background-color: #27ae60; }
        .btn-medium { background-color: #f1c40f; color: #111; }
        .btn-medium:hover { background-color: #f39c12; color: white; }
        .btn-hard { background-color: #e74c3c; color: white; }
        .btn-hard:hover { background-color: #c0392b; }
        .btn-back { background-color: #7f8c8d; color: white; font-size: 14px; padding: 8px 16px; }
        .btn-back:hover { background-color: #95a5a6; }
        .btn-online { background-color: #9b59b6; color: white; }
        .btn-online:hover { background-color: #8e44ad; }
        .btn-cancel { background-color: #e74c3c; color: white; font-size: 14px; }
        .btn-cancel:hover { background-color: #c0392b; }

        #gameOverOverlay {
            display: none;
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.6);
            justify-content: center;
            align-items: center;
            flex-direction: column;
            z-index: 5;
        }
        #winnerText {
            font-size: 30px;
            font-weight: bold;
            margin-bottom: 25px;
            text-align: center;
            text-shadow: 0 0 10px rgba(255,255,255,0.5);
        }
        .btn-restart { background-color: #2ecc71; color: white; }
        .btn-restart:hover { background-color: #27ae60; }
        .btn-menu { background-color: #e67e22; color: white; }
        .btn-menu:hover { background-color: #d35400; }
    </style>
</head>
<body>

    <h1 style="margin-bottom: 10px;">STICKMAN SHOWDOWN</h1>
    
    <div id="menu">
        <div id="mainMenu">
            <h2>CHỌN CHẾ ĐỘ CHƠI</h2>
            <button onclick="showDifficultyMenu()">ĐẤU VỚI MÁY (BOT)</button>
            <button onclick="startGame('pvp')">2 NGƯỜI CHƠI (PVP OFFLINE)</button>
            <button class="btn-online" onclick="startOnlineMatchmaking()">🌍 CHƠI ONLINE (TÌM TRẬN)</button>
        </div>

        <div id="difficultyMenu">
            <h2>CHỌN ĐỘ KHÓ CỦA BOT</h2>
            <button class="btn-easy" onclick="startGame('ai', 'easy')">DỄ</button>
            <button class="btn-medium" onclick="startGame('ai', 'medium')">TRUNG BÌNH</button>
            <button class="btn-hard" onclick="startGame('ai', 'hard')">KHÓ</button>
            <button class="btn-back" onclick="hideDifficultyMenu()">⬅ QUAY LẠI</button>
        </div>
    </div>

    <div style="position: relative; width: 800px; height: 400px;">
        <canvas id="gameCanvas" width="800" height="400"></canvas>
        
        <div id="gameOverOverlay">
            <div id="winnerText">MÁY ĐÃ CHIẾN THẮNG!</div>
            <div>
                <button id="restartBtn" class="btn-restart" onclick="restartGame()">CHƠI LẠI</button>
                <button class="btn-menu" onclick="resetToMenu()">QUAY VỀ MENU CHÍNH</button>
            </div>
        </div>
    </div>

    <div class="controls">
        <div>
            <h3 style="color: #3498db;">Player 1 (Xanh) - Phía Bạn khi Online</h3>
            <p>Di chuyển: A, D | Nhảy: W | Đấm: Click Chuột Trái</p>
        </div>
        <div id="p2ControlText">
            <h3 style="color: #e74c3c;">Player 2 (Đỏ) - Đối Thủ khi Online</h3>
            <p>Di chuyển: ⬅ ➡ | Nhảy: ⬆ | Đấm: L</p>
        </div>
    </div>

<script>
const canvas = document.getElementById("gameCanvas");
const ctx = canvas.getContext("2d");

// Kết nối tới Socket.io server
const socket = io();

const GRAVITY = 0.6;
const GROUND_Y = 350;

// ĐỊNH NGHĨA KÍCH THƯỚC MAP GẤP ĐÔI (1600px)
const MAP_WIDTH = 1600; 
const VIEW_WIDTH = canvas.width; // 800px

let gameMode = null; 
let botDifficulty = 'medium'; 
let isGameOver = false;
let winner = null; 

// Biến điều khiển Online
let onlineRoomId = null;
let amIPlayer1 = true; 

let fireworks = [];
let shakeTimer = 0;

// Biến lưu vị trí Camera X
let cameraX = 0;

const keys = {
    a: false, d: false, w: false, click: false,
    ArrowLeft: false, ArrowRight: false, ArrowUp: false, l: false, r: false
};

class Stickman {
    constructor(x, y, color, controls, isAI = false) {
        this.x = x;
        this.y = y;
        this.color = color;
        this.controls = controls;
        this.isAI = isAI;
        
        this.width = 30;
        this.height = 80;
        this.vx = 0;
        this.vy = 0;
        this.speed = 5;
        this.jumpForce = 12;
        this.isGrounded = false;
        
        this.hp = 100;
        this.isAttacking = false;
        this.attackCooldown = 0;
        this.facing = (x < MAP_WIDTH / 2) ? 1 : -1;
        
        this.animTimer = 0; 
        this.aiDecisionTimer = 0;
    }

    reset(x, y, facing) {
        this.x = x;
        this.y = y;
        this.vx = 0;
        this.vy = 0;
        this.hp = 100;
        this.isAttacking = false;
        this.attackCooldown = 0;
        this.facing = facing;
        this.animTimer = 0;
    }

    update(opponent) {
        if (this.vx !== 0) {
            this.animTimer += 0.2;
        } else {
            this.animTimer = 0;
        }

        this.vy += GRAVITY;
        this.y += this.vy;

        if (this.y + this.height >= GROUND_Y) {
            this.y = GROUND_Y - this.height;
            this.vy = 0;
            this.isGrounded = true;
        } else {
            this.isGrounded = false;
        }

        if (this.attackCooldown > 0) this.attackCooldown--;

        if (gameMode === 'online') {
            // Logic online di chuyển được đồng bộ trong GameLoop
        } else if (this.isAI) {
            this.handleAI(opponent);
        } else {
            this.handlePlayer();
        }

        this.x += this.vx;
        
        // GIỚI HẠN DI CHUYỂN THEO MAP MỚI (1600px)
        if (this.x < 0) this.x = 0;
        if (this.x + this.width > MAP_WIDTH) this.x = MAP_WIDTH - this.width;
    }

    handlePlayer() {
        this.vx = 0;
        if (keys[this.controls.left]) { this.vx = -this.speed; this.facing = -1; }
        if (keys[this.controls.right]) { this.vx = this.speed; this.facing = 1; }

        if (keys[this.controls.up] && this.isGrounded) {
            this.vy = -this.jumpForce;
            this.isGrounded = false;
        }

        if (keys[this.controls.attack] && this.attackCooldown === 0) {
            this.triggerAttack();
        }
    }

    handleAI(player) {
        this.vx = 0;
        this.aiDecisionTimer++;

        let distanceX = player.x - this.x;
        let absoluteDistanceX = Math.abs(distanceX);

        if (distanceX > 0) this.facing = 1;
        else if (distanceX < 0) this.facing = -1;

        let speedModifier = 0.8; 
        let punchChance = 0.15;
        let dodgeChance = 0.08;

        if (botDifficulty === 'easy') {
            speedModifier = 0.5;   
            punchChance = 0.06;    
            dodgeChance = 0.01;    
        } else if (botDifficulty === 'medium') {
            speedModifier = 0.8;   
            punchChance = 0.15;
            dodgeChance = 0.08;
        } else if (botDifficulty === 'hard') {
            speedModifier = 1.1;   
            punchChance = 0.35;    
            dodgeChance = 0.25;    
        }

        if (absoluteDistanceX > 40) {
            this.vx = distanceX > 0 ? this.speed * speedModifier : -this.speed * speedModifier;
        }

        if (absoluteDistanceX <= 50 && this.attackCooldown === 0) {
            if (Math.random() < punchChance) {
                this.triggerAttack();
            }
        }

        if (player.isAttacking && absoluteDistanceX < 60 && this.isGrounded) {
            if (Math.random() < dodgeChance) {
                this.vy = -this.jumpForce;
                this.isGrounded = false;
            }
        }
    }

    triggerAttack() {
        this.isAttacking = true;
        this.attackCooldown = (botDifficulty === 'hard' && this.isAI) ? 15 : 25;
        setTimeout(() => this.isAttacking = false, 150);
    }

    draw() {
        let drawX = this.x - cameraX;

        ctx.strokeStyle = this.color;
        ctx.lineWidth = 4;
        ctx.lineCap = "round";
        ctx.lineJoin = "round";

        let lean = this.isAttacking ? 8 * this.facing : 0;
        let headX = drawX + this.width / 2 + lean;
        let headY = this.y + 15;
        let spineBottomX = drawX + this.width / 2;
        let spineBottomY = this.y + 50;

        ctx.beginPath();
        ctx.arc(headX, headY, 12, 0, Math.PI * 2);
        ctx.stroke();

        ctx.beginPath();
        ctx.moveTo(headX, headY + 12);
        ctx.lineTo(spineBottomX, spineBottomY);
        ctx.stroke();

        let leftLegX, leftLegY, rightLegX, rightLegY;

        if (!this.isGrounded) {
            let falling = this.vy > 0;
            leftLegX = spineBottomX - (falling ? 8 : 15);
            leftLegY = this.y + this.height - (falling ? 0 : 10);
            rightLegX = spineBottomX + (falling ? 8 : 5);
            rightLegY = this.y + this.height - (falling ? 5 : 15);
        } else if (this.vx !== 0) {
            let swing = Math.sin(this.animTimer) * 18;
            leftLegX = spineBottomX + swing;
            leftLegY = this.y + this.height - Math.abs(Math.sin(this.animTimer)) * 5;
            rightLegX = spineBottomX - swing;
            rightLegY = this.y + this.height - Math.abs(Math.cos(this.animTimer)) * 5;
        } else {
            leftLegX = spineBottomX - 12;
            leftLegY = this.y + this.height;
            rightLegX = spineBottomX + 12;
            rightLegY = this.y + this.height;
        }

        ctx.beginPath();
        ctx.moveTo(spineBottomX, spineBottomY); ctx.lineTo(leftLegX, leftLegY);
        ctx.moveTo(spineBottomX, spineBottomY); ctx.lineTo(rightLegX, rightLegY);
        ctx.stroke();

        let shoulderX = headX;
        let shoulderY = headY + 18;

        ctx.beginPath();
        if (this.isAttacking) {
            ctx.moveTo(shoulderX, shoulderY);
            ctx.lineTo(shoulderX + (45 * this.facing), shoulderY);
            ctx.moveTo(shoulderX, shoulderY);
            ctx.lineTo(shoulderX - (10 * this.facing), shoulderY + 15);
            ctx.lineTo(shoulderX, shoulderY + 25);
        } else {
            let armSwing = this.vx !== 0 ? Math.sin(this.animTimer) * 10 : 0;
            ctx.moveTo(shoulderX, shoulderY);
            ctx.lineTo(shoulderX - 10 + armSwing, shoulderY + 20);
            ctx.lineTo(shoulderX - 5 + armSwing, shoulderY + 38);

            ctx.moveTo(shoulderX, shoulderY);
            ctx.lineTo(shoulderX + 10 - armSwing, shoulderY + 20);
            ctx.lineTo(shoulderX + 15 - armSwing, shoulderY + 38);
        }
        ctx.stroke();
    }

    getAttackBox() {
        return {
            x: this.facing === 1 ? this.x + this.width : this.x - 45,
            y: this.y + 10,
            width: 45,
            height: 20
        };
    }
}

const p1 = new Stickman(200, 200, "#3498db", { left: 'a', right: 'd', up: 'w', attack: 'click' });
const p2 = new Stickman(1400, 200, "#e74c3c", { left: 'ArrowLeft', right: 'ArrowRight', up: 'ArrowUp', attack: 'l' });

class Particle {
    constructor(x, y, color) {
        this.x = x;
        this.y = y;
        this.color = color;
        this.radius = Math.random() * 3 + 1;
        let angle = Math.random() * Math.PI * 2;
        let speed = Math.random() * 5 + 2;
        this.vx = Math.cos(angle) * speed;
        this.vy = Math.sin(angle) * speed;
        this.alpha = 1;
        this.decay = Math.random() * 0.015 + 0.01;
    }
    update() {
        this.x += this.vx;
        this.y += this.vy;
        this.vy += 0.05;
        this.alpha -= this.decay;
    }
    draw() {
        ctx.save();
        ctx.globalAlpha = this.alpha;
        ctx.beginPath();
        ctx.arc(this.x - cameraX, this.y, this.radius, 0, Math.PI * 2);
        ctx.fillStyle = this.color;
        ctx.fill();
        ctx.restore();
    }
}

function spawnFirework() {
    let colors = ['#f1c40f', '#e74c3c', '#2ecc71', '#9b59b6', '#3498db', '#e67e22', '#00ffff'];
    let randomColor = colors[Math.floor(Math.random() * colors.length)];
    let targetX = Math.random() * VIEW_WIDTH + cameraX;
    let targetY = Math.random() * (canvas.height - 150) + 50;
    for(let i = 0; i < 40; i++) {
        fireworks.push(new Particle(targetX, targetY, randomColor));
    }
}

function checkHit(attacker, defender) {
    if (!attacker.isAttacking) return false;
    let box = attacker.getAttackBox();
    return (
        box.x < defender.x + defender.width &&
        box.x + box.width > defender.x &&
        box.y < defender.y + defender.height &&
        box.y + box.height > defender.y
    );
}

function drawUI() {
    ctx.font = "14px Arial";
    ctx.fillStyle = "#555"; ctx.fillRect(20, 20, 200, 20);
    ctx.fillStyle = "#3498db"; ctx.fillRect(20, 20, Math.max(0, p1.hp * 2), 20);
    ctx.fillStyle = "#fff"; ctx.fillText(gameMode === 'online' ? (amIPlayer1 ? "BẠN (XANH): " : "ĐỐI THỦ (XANH): ") + Math.round(p1.hp) : "P1 HP: " + Math.round(p1.hp), 25, 34);

    ctx.fillStyle = "#555"; ctx.fillRect(canvas.width - 220, 20, 200, 20);
    ctx.fillStyle = "#e74c3c"; ctx.fillRect(canvas.width - 220, 20, Math.max(0, p2.hp * 2), 20);
    ctx.fillStyle = "#fff";
    
    let nameP2 = "P2 HP: ";
    if (gameMode === 'online') {
        nameP2 = amIPlayer1 ? "ĐỐI THỦ (ĐỎ): " : "BẠN (ĐỎ): ";
    } else if (p2.isAI) {
        if (botDifficulty === 'easy') nameP2 = "BOT (DỄ) HP: ";
        else if (botDifficulty === 'medium') nameP2 = "BOT (VỪA) HP: ";
        else if (botDifficulty === 'hard') nameP2 = "BOT (KHÓ) HP: ";
    }
    ctx.fillText(nameP2 + Math.round(p2.hp), canvas.width - 215, 34);
}

function gameLoop() {
    if (isGameOver) {
        gameOverLoop();
        return;
    }

    if (gameMode === null) return; 

    ctx.clearRect(0, 0, canvas.width, canvas.height);

    // [1] GHIM CAMERA VÀO NHÂN VẬT CỦA BẠN TRÊN TOÀN MAP
    let targetX = p1.x; 
    if (gameMode === 'online') {
        targetX = amIPlayer1 ? p1.x : p2.x;
    }
    cameraX = targetX - VIEW_WIDTH / 2;
    
    if (cameraX < 0) cameraX = 0;
    if (cameraX > MAP_WIDTH - VIEW_WIDTH) cameraX = MAP_WIDTH - VIEW_WIDTH;

    // VẼ SÀN ĐẤU
    ctx.strokeStyle = "#fff"; ctx.lineWidth = 2;
    ctx.beginPath(); 
    ctx.moveTo(0 - cameraX, GROUND_Y); 
    ctx.lineTo(MAP_WIDTH - cameraX, GROUND_Y); 
    ctx.stroke();

    ctx.strokeStyle = "#444";
    for(let i = 100; i < MAP_WIDTH; i += 100) {
        ctx.beginPath();
        ctx.moveTo(i - cameraX, GROUND_Y);
        ctx.lineTo(i - cameraX, GROUND_Y + 10);
        ctx.stroke();
    }

    // XỬ LÝ DI CHUYỂN
    if (gameMode === 'online') {
        let myCharacter = amIPlayer1 ? p1 : p2;
        myCharacter.vx = 0;
        
        if (keys['a']) { myCharacter.vx = -myCharacter.speed; myCharacter.facing = -1; }
        if (keys['d']) { myCharacter.vx = myCharacter.speed; myCharacter.facing = 1; }
        if (keys['w'] && myCharacter.isGrounded) {
            myCharacter.vy = -myCharacter.jumpForce;
            myCharacter.isGrounded = false;
        }
        if (keys['click'] && myCharacter.attackCooldown === 0) {
            myCharacter.triggerAttack();
        }

        p1.update(p2);
        p2.update(p1);

        // Gửi dữ liệu trạng thái của bản thân lên server liên tục
        socket.emit('playerAction', {
            roomId: onlineRoomId,
            x: myCharacter.x,
            y: myCharacter.y,
            vx: myCharacter.vx,
            facing: myCharacter.facing,
            isAttacking: myCharacter.isAttacking,
            hp: myCharacter.hp
        });
    } else {
        p1.update(p2);
        p2.update(p1);
    }

    // =================================================================
    // [2] ĐỒNG BỘ VA CHẠM TRỪ MÁU: CHUẨN HOÁ ONLINE (ĐÃ ĐƯỢC SỬA LỖI)
    // =================================================================
    if (gameMode === 'online') {
        if (amIPlayer1) {
            // Bạn là P1 (Xanh): Chỉ kiểm tra xem P2 (Đỏ) có đấm trúng BẠN không.
            // Nếu trúng, BẠN tự trừ máu của BẠN và tự đẩy lùi BẠN.
            if (checkHit(p2, p1)) {
                p1.hp -= 5;
                p1.x += 15 * p2.facing;
                p2.isAttacking = false;
            }
        } else {
            // Bạn là P2 (Đỏ): Chỉ kiểm tra xem P1 (Xanh) có đấm trúng BẠN không.
            // Nếu trúng, BẠN tự trừ máu của BẠN và tự đẩy lùi BẠN.
            if (checkHit(p1, p2)) {
                p2.hp -= 5;
                p2.x += 15 * p1.facing;
                p1.isAttacking = false;
            }
        }
    } else {
        // Nếu chơi Offline (Đấu Bot / PvP 1 máy) -> Giữ nguyên tính toán va chạm 2 chiều cục bộ
        if (checkHit(p1, p2)) {
            p2.hp -= 5; 
            p2.x += 15 * p1.facing; 
            p1.isAttacking = false; 
        }
        if (checkHit(p2, p1)) {
            p1.hp -= 5; 
            p1.x += 15 * p2.facing; 
            p2.isAttacking = false;
        }
    }

    p1.draw();
    p2.draw();
    drawUI();

    // Check kết thúc trận đấu
    if (p1.hp <= 0 || p2.hp <= 0) {
        isGameOver = true;
        let msg = "";
        
        if (gameMode === 'online') {
            if ((amIPlayer1 && p1.hp <= 0) || (!amIPlayer1 && p2.hp <= 0)) {
                winner = 'lost';
                msg = "BẠN ĐÃ THUA TRẬN ĐẤU ONLINE!";
                shakeTimer = 30;
            } else {
                winner = 'won';
                msg = "XUẤT SẮC! BẠN ĐÃ CHIẾN THẮNG ONLINE!";
            }
        } else if (p2.isAI) {
            if (p1.hp <= 0) { winner = 'p2'; msg = "MÁY (BOT) ĐÃ CHIẾN THẮNG!"; shakeTimer = 30; } 
            else { winner = 'p1'; msg = "BẠN ĐÃ CHIẾN THẮNG BOT!"; }
        } else {
            if (p1.hp <= 0) { winner = 'p2'; msg = "PLAYER 2 (ĐỎ) CHIẾN THẮNG!"; }
            else { winner = 'p1'; msg = "PLAYER 1 (XANH) CHIẾN THẮNG!"; }
        }
        
        document.getElementById("winnerText").innerText = msg;
        if(winner === 'lost' || winner === 'p2') {
            document.getElementById("winnerText").style.color = "#ff3333";
        } else {
            document.getElementById("winnerText").style.color = "#2ecc71";
        }
        document.getElementById("gameOverOverlay").style.display = "flex";
    }

    requestAnimationFrame(gameLoop);
}

function gameOverLoop() {
    if (!isGameOver) return;

    if (winner === 'lost' || winner === 'p2') {
        if (shakeTimer > 0) {
            let shakeX = (Math.random() - 0.5) * 15;
            let shakeY = (Math.random() - 0.5) * 15;
            canvas.style.transform = `translate(${shakeX}px, ${shakeY}px)`;
            shakeTimer--;
        } else {
            canvas.style.transform = 'translate(0px, 0px)';
        }
        ctx.fillStyle = "rgba(10, 0, 0, 0.1)";
        ctx.fillRect(0, 0, canvas.width, canvas.height);
        if (Math.random() < 0.1) {
            ctx.fillStyle = "rgba(231, 76, 60, 0.2)";
            ctx.fillRect(Math.random()*canvas.width, Math.random()*canvas.height, Math.random()*200, Math.random()*10);
        }
    } else {
        canvas.style.transform = 'translate(0px, 0px)';
        ctx.fillStyle = "rgba(17, 17, 17, 0.15)";
        ctx.fillRect(0, 0, canvas.width, canvas.height);
        if (Math.random() < 0.08) spawnFirework();
        for (let i = fireworks.length - 1; i >= 0; i--) {
            fireworks[i].update();
            fireworks[i].draw();
            if (fireworks[i].alpha <= 0) fireworks.splice(i, 1);
        }
    }
    p1.draw(); p2.draw();
    requestAnimationFrame(gameOverLoop);
}

function startOnlineMatchmaking() {
    document.getElementById("mainMenu").innerHTML = `
        <h2>ĐANG TÌM ĐỐI THỦ...</h2>
        <p>Vui lòng đợi người chơi khác tham gia phòng.</p>
        <button class="btn-cancel" onclick="cancelOnlineMatchmaking()">❌ HỦY TÌM TRẬN</button>
    `;
    gameMode = 'online';
    socket.emit('findMatch');
}

function cancelOnlineMatchmaking() {
    socket.emit('cancelFindMatch'); 
    resetToMenu();
}

socket.on('waitingForPlayer', () => {});

socket.on('matchFound', (data) => {
    onlineRoomId = data.roomId;
    amIPlayer1 = (data.players[0] === socket.id);

    document.getElementById("menu").style.display = "none";
    document.getElementById("restartBtn").style.display = "none"; 
    
    p1.reset(200, 200, 1);
    p2.reset(1400, 200, -1);
    isGameOver = false;

    document.getElementById("p2ControlText").innerHTML = `<h3 style="color: #e74c3c;">Đối Thủ Online</h3><p>Trạng thái: Đã kết nối mạng</p>`;
    gameLoop();
});

socket.on('opponentAction', (data) => {
    let opponent = amIPlayer1 ? p2 : p1;
    opponent.x = data.x;
    opponent.y = data.y;
    opponent.vx = data.vx;
    opponent.facing = data.facing;
    opponent.isAttacking = data.isAttacking;
    opponent.hp = data.hp; // Cập nhật lượng máu chuẩn xác từ máy của đối thủ gửi sang
});

socket.on('opponentLeft', () => {
    if(!isGameOver) {
        isGameOver = true;
        winner = 'won';
        document.getElementById("winnerText").innerText = "ĐỐI THỦ ĐÃ RỜI TRẬN! BẠN THẮNG!";
        document.getElementById("winnerText").style.color = "#2ecc71";
        document.getElementById("gameOverOverlay").style.display = "flex";
    }
});

function showDifficultyMenu() {
    document.getElementById("mainMenu").style.display = "none";
    document.getElementById("difficultyMenu").style.display = "flex";
}

function hideDifficultyMenu() {
    document.getElementById("difficultyMenu").style.display = "none";
    document.getElementById("mainMenu").style.display = "block";
}

function startGame(mode, difficulty = 'medium') {
    gameMode = mode;
    botDifficulty = difficulty;
    isGameOver = false;
    winner = null;
    fireworks = [];
    shakeTimer = 0;
    cameraX = 0;
    canvas.style.transform = 'translate(0px, 0px)';

    document.getElementById("menu").style.display = "none";
    document.getElementById("gameOverOverlay").style.display = "none";
    document.getElementById("restartBtn").style.display = "inline-block";

    p1.reset(200, 200, 1);
    
    if (mode === 'ai') {
        p2.isAI = true;
        p2.reset(1400, 200, -1);
        let diffText = "Trung bình";
        if(difficulty === 'easy') diffText = "Dễ";
        if(difficulty === 'hard') diffText = "Khó";
        document.getElementById("p2ControlText").innerHTML = `<h3 style="color: #e74c3c;">Máy (Bot Tự Động)</h3><p>Độ khó: ${diffText}</p>`;
    } else {
        p2.isAI = false;
        p2.reset(1400, 200, -1);
        document.getElementById("p2ControlText").innerHTML = `<h3 style="color: #e74c3c;">Player 2 (Đỏ)</h3><p>Di chuyển: ⬅ ➡ | Nhảy: ⬆ | Đấm: L</p>`;
    }

    gameLoop();
}

function restartGame() {
    if(gameMode === 'online') return;
    isGameOver = false; winner = null; fireworks = []; shakeTimer = 0; cameraX = 0;
    canvas.style.transform = 'translate(0px, 0px)';
    document.getElementById("gameOverOverlay").style.display = "none";
    p1.reset(200, 200, 1); p2.reset(1400, 200, -1);
    gameLoop();
}

function resetToMenu() {
    document.getElementById("mainMenu").innerHTML = `
        <h2>CHỌN CHẾ ĐỘ CHƠI</h2>
        <button onclick="showDifficultyMenu()">ĐẤU VỚI MÁY (BOT)</button>
        <button onclick="startGame('pvp')">2 NGƯỜI CHƠI (PVP OFFLINE)</button>
        <button class="btn-online" onclick="startOnlineMatchmaking()">🌍 CHƠI ONLINE (TÌM TRẬN)</button>
    `;
    gameMode = null; isGameOver = false; winner = null; fireworks = []; shakeTimer = 0; cameraX = 0;
    canvas.style.transform = 'translate(0px, 0px)';
    document.getElementById("gameOverOverlay").style.display = "none";
    ctx.clearRect(0, 0, canvas.width, canvas.height);
    hideDifficultyMenu();
    document.getElementById("menu").style.display = "block";
}

window.addEventListener("keydown", (e) => {
    let key = e.key.toLowerCase();
    if (key in keys) keys[key] = true;
    if (e.key in keys) keys[e.key] = true;
});

window.addEventListener("keyup", (e) => {
    let key = e.key.toLowerCase();
    if (key in keys) keys[key] = false;
    if (e.key in keys) keys[e.key] = false;
});

window.addEventListener("mousedown", (e) => {
    if (e.button === 0 && gameMode !== null && !isGameOver) {
        keys['click'] = true;
    }
});

window.addEventListener("mouseup", (e) => {
    if (e.button === 0) {
        keys['click'] = false;
    }
});
</script>
</body>
</html>
